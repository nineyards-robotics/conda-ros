[workspace]
name = "conda-ros"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.11"
pyyaml = "*"
rattler-build = "*"
rattler-index = "*"

[tasks]
generate-recipes = "python -m pipeline.generate_recipes"
generate-build-config = "python -m pipeline.generate_build_config"
resolve-build-order = "python -m pipeline.resolve_build_order"
run-build = "python -m pipeline.run_build"
generate-snapshot-metapackage = "python -m pipeline.generate_snapshot_metapackage"
serve-local = "rattler-index fs build/output && python -m http.server 8000 --directory build/output"
